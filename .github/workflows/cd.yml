name: cd

on: 
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Installing goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: build the app
        run: ./scripts/buildprod.sh

      - name: Migrate up the database
        run: ./scripts/migrateup.sh

      - name: Check sensitive credentials
        run: git diff --cached

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Use gcloud CLI'
        run: gcloud info

      - name: Deploy the app to google cloud
        run: gcloud builds submit --tag asia-southeast2-docker.pkg.dev/notely-492303/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image asia-southeast2-docker.pkg.dev/notely-492303/notely-ar-repo/notely:latest --region asia-southeast2 --allow-unauthenticated --project notely-492303  --max-instances=4

